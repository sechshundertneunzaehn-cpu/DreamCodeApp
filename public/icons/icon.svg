<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#1e1535"/>
      <stop offset="100%" stop-color="#0f0b1a"/>
    </radialGradient>
    <linearGradient id="moon" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#c084fc"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
    <linearGradient id="star" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#e9d5ff"/>
      <stop offset="100%" stop-color="#d946ef"/>
    </linearGradient>
  </defs>
  <!-- Background circle -->
  <circle cx="256" cy="256" r="256" fill="url(#bg)"/>
  <!-- Crescent moon -->
  <path d="M280 100c-86 0-156 70-156 156s70 156 156 156c30 0 58-8.5 82-23.5-24 15-52 23.5-82 23.5-86 0-156-70-156-156S194 100 280 100c30 0 58 8.5 82 23.5C338 108.5 310 100 280 100z" fill="url(#moon)" opacity="0"/>
  <path d="M310 96a160 160 0 1 0 0 320 130 130 0 0 1 0-320z" fill="url(#moon)"/>
  <!-- Stars -->
  <circle cx="160" cy="140" r="6" fill="url(#star)"/>
  <circle cx="120" cy="200" r="4" fill="url(#star)" opacity="0.8"/>
  <circle cx="140" cy="310" r="5" fill="url(#star)" opacity="0.9"/>
  <circle cx="190" cy="120" r="3" fill="url(#star)" opacity="0.7"/>
  <circle cx="100" cy="260" r="3.5" fill="url(#star)" opacity="0.6"/>
  <!-- Accent star (larger, sparkle shape) -->
  <g transform="translate(150, 170)">
    <path d="M0-20 L5-5 L20 0 L5 5 L0 20 L-5 5 L-20 0 L-5-5 Z" fill="url(#star)"/>
  </g>
  <g transform="translate(110, 280)" opacity="0.8">
    <path d="M0-14 L3.5-3.5 L14 0 L3.5 3.5 L0 14 L-3.5 3.5 L-14 0 L-3.5-3.5 Z" fill="url(#star)"/>
  </g>
  <!-- Small glow dots -->
  <circle cx="170" cy="380" r="2.5" fill="#c084fc" opacity="0.5"/>
  <circle cx="200" cy="160" r="2" fill="#e9d5ff" opacity="0.4"/>
  <circle cx="130" cy="340" r="2" fill="#d946ef" opacity="0.5"/>
</svg>
