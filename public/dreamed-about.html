<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Jemand hat von dir getraeumt - DreamCode</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #0f0b1a 0%, #1a0b2e 50%, #0f0518 100%);
      color: #e2e8f0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .card {
      max-width: 400px;
      width: 100%;
      background: rgba(15, 5, 24, 0.8);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 24px;
      padding: 40px 32px;
      text-align: center;
    }
    .moon { font-size: 64px; margin-bottom: 24px; }
    h1 { font-size: 24px; font-weight: 700; margin-bottom: 12px; }
    p { color: #94a3b8; font-size: 16px; line-height: 1.6; margin-bottom: 32px; }
    .cta {
      display: inline-block;
      background: linear-gradient(135deg, #6366f1, #d946ef);
      color: white;
      font-weight: 700;
      font-size: 16px;
      padding: 16px 32px;
      border-radius: 16px;
      text-decoration: none;
      transition: transform 0.2s, box-shadow 0.2s;
      box-shadow: 0 8px 32px rgba(139, 92, 246, 0.3);
    }
    .cta:hover { transform: scale(1.05); box-shadow: 0 12px 40px rgba(139, 92, 246, 0.4); }
    .footer { margin-top: 24px; font-size: 12px; color: #475569; }
    .footer a { color: #8b5cf6; text-decoration: none; }
  </style>
</head>
<body>
  <div class="card">
    <div class="moon">&#127769;</div>
    <h1>Jemand hat von dir getraeumt.</h1>
    <p>Oeffne DreamCode um herauszufinden wer und was getraeumt wurde.</p>
    <a href="https://dream-code.app" class="cta">JETZT ANSEHEN &#8594;</a>
    <div class="footer">
      <a href="https://dream-code.app">dream-code.app</a>
    </div>
  </div>
</body>
</html>
