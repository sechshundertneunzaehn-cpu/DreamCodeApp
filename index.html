  <body>
    <script>
      // Fix: Browser-Erweiterungen (Google Translate, Grammarly etc.) modifizieren
      // DOM-Knoten. React erwartet die Original-Struktur und crasht mit removeChild.
      // Dieser Patch leitet die Operation an den echten Parent weiter.
      if (typeof Node !== 'undefined') {
        var _origRemoveChild = Node.prototype.removeChild;
        Node.prototype.removeChild = function(child) {
          if (child && child.parentNode !== this) {
            if (child.parentNode) return child.parentNode.removeChild(child);
            return child;
          }
          return _origRemoveChild.call(this, child);
        };
        var _origInsertBefore = Node.prototype.insertBefore;
        Node.prototype.insertBefore = function(newNode, refNode) {
          if (refNode && refNode.parentNode !== this) {
            return this.appendChild(newNode);
          }
          return _origInsertBefore.call(this, newNode, refNode);
        };
      }
    </script>
    <div id="root"></div>
    <script type="module" src="/index.tsx"></script>
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js')
            .then((reg) => {
              console.log('SW registered:', reg.scope);
              reg.addEventListener('updatefound', () => {
                const newWorker = reg.installing;
                if (newWorker) {
                  newWorker.addEventListener('statechange', () => {
                    if (newWorker.state === 'activated' && navigator.serviceWorker.controller) {
                      console.log('New SW version available');
                    }
                  });
                }
              });
            })
            .catch((err) => console.warn('SW registration failed:', err));
        });
      }
    </script>
