version: '3.8'

services:
  redis:
    image: redis:7-alpine
    container_name: edu-scraper-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    command: >
      redis-server
      --save 60 1
      --loglevel warning
      --maxmemory 2gb
      --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Optional: Redis UI for debugging the queue
  redis-commander:
    image: rediscommander/redis-commander:latest
    container_name: edu-scraper-redis-ui
    restart: unless-stopped
    environment:
      - REDIS_HOSTS=local:redis:6379
    ports:
      - "8081:8081"
    depends_on:
      redis:
        condition: service_healthy
    profiles:
      - debug  # only start with: docker-compose --profile debug up

volumes:
  redis-data:
    driver: local
