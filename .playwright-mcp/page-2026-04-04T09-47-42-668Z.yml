            - paragraph [ref=e4064]: I’m at a party. It has the feeling of Burning Man in that there are people normally dressed and others wildly dressed, some are drinking and others are sober, some are on stronger drugs. We have come up with a new drug that doesn’t have a name yet. It’s like a combination of Molly and something else. There is a very artistic creative guy dancing and frolicking around. He comes outside and he takes a piece of paper that he’s drawn and written on, and he posts it high on a tree. He’s tall and he can reach this high. Someone gets it down and reads the paper. They say, “Oh my gosh, this is the name of the drug. It’s Meggy. It’s a combination of Molly and Peggy.” The party dissipates a bit. I go home with my husband. We go upstairs. This is not a home I recognize from waking life. We decide to take our dose of Meggy. We know it takes a while to begin. We wander around. I get a book and start to read. I notice my vision starting to change - my right eye that in waking life is already damaged, starts to get really puffy and slotty so I can’t see well, and my other eye starts to change as well. I feel like it’s starting to set in. Someone comes and knocks on the door. We let him in and he says, “We’ve gotta go.” So we all get in the car. There are cars filling up with other people. I see a blue car that was earlier in the day quite nice, but now it’s beat up a bit and covered in mud. We’re all trying really hard to get out fast, so something is going on. We arrive at a rundown hotel. One of the girls steps in and she’s trying to talk to the concierge. I’m watching her from a different perspective - as if from behind the concierge’s head. I’m looking her up and down. She’s dressed as a very prim and proper lady, all in white with white pumps. But she has dark black circles under her eyes and she’s really pale. She doesn’t look quite right. All of us have taken Meggy. Then there is violence. The woman transforms into a wild animal and kills him. The guy in charge of the whole operation has turned into a grizzly bear. I turn into a wild cat. Everyone is turning into wild predators. There’s a graphic scene in the elevator where I bat somebody’s head off. There’s guts and brain matter everywhere. All the animals congregate because we have to get together and get out. We all transform into somewhat human form and get out. A lot of time passes. I’ve separated out from the group and am trying to live a normal human life. I’m driving in my car down a country road. I end up at a farm. I see the guy who was in charge. Something has shifted in him and there is peace in him. He welcomes me. He takes me on a tour of the farm and introduces me to the people who live there. It’s an orphanage. There are some people who were originally part of the Meggy group. The effects of the drug have changed. Now they use it only occasionally to spark creativity or connection to each other and the Earth. They’ve created a completely self-sustainable farm, growing vegetables and fruit, milking goats and cows, raising chickens...they have found a way to make peace with themselves and the Earth. They take care of the Earth and the Earth takes care of them by providing food, shelter and home.
